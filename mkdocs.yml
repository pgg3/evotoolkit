site_name: EvoToolkit Core
site_description: Core SDK for LLM-driven evolutionary search
site_author: Ping Guo
site_url: !ENV [READTHEDOCS_CANONICAL_URL, ""]
docs_dir: docs
hooks:
  - mkdocs_hooks.py

theme:
  name: material

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 简体中文
          build: true
          nav_translations:
            Home: 首页
            Installation: 安装
            Quick Start: 快速开始
            Extensions: 扩展
            Migration: 迁移

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.highlight:
      pygments_lang_class: true
  - pymdownx.superfences

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - Extensions: extensions.md
  - Migration: migration.md
