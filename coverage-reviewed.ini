[run]
source = src/evotoolkit
omit =
    */evo_method/cann_initer/*
    *\evo_method\cann_initer\*
    */task/cann_init/*
    *\task\cann_init\*
    */task/cuda_engineering/ai_cuda_engineer/*
    *\task\cuda_engineering\ai_cuda_engineer\*
    */task/cuda_engineering/evaluator/*
    *\task\cuda_engineering\evaluator\*

[report]
show_missing = true
exclude_lines =
    pragma: no cover
    if __name__
    raise NotImplementedError
